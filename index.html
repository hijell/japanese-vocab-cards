<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日文互動單字卡 - Vibe Coding 作業</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #f0f2f5;
            --card-white: #ffffff;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 { color: #2d3436; margin-bottom: 10px; }
        p { color: #636e72; margin-bottom: 30px; }

        /* 卡片容器 */
        .card-container {
            width: 350px;
            height: 450px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 20px;
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            background: var(--card-white);
            padding: 20px;
            box-sizing: border-box;
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .word-jp { font-size: 3rem; font-weight: bold; margin-bottom: 10px; }
        .word-reading { font-size: 1.2rem; color: var(--primary); }
        .word-meaning { font-size: 2.5rem; font-weight: bold; }

        /* 控制列 */
        .controls {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        button:hover { background: #5649c0; transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        .speed-controls {
            display: flex;
            background: #dfe6e9;
            padding: 5px;
            border-radius: 50px;
            gap: 5px;
        }

        .speed-btn {
            background: transparent;
            color: #2d3436;
            box-shadow: none;
            padding: 8px 15px;
        }

        .speed-btn.active {
            background: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>日文單字挑戰卡</h1>
    <p>點擊卡片翻面，使用下方按鈕切換單字或發音</p>

    <div class="card-container" id="cardContainer" onclick="toggleFlip()">
        <div class="card-inner">
            <div class="card-face card-front">
                <div class="word-jp" id="jpWord">こんにちは</div>
                <div class="word-reading" id="jpReading">Konnichiwa</div>
            </div>
            <div class="card-face card-back">
                <div class="word-meaning" id="zhMeaning">你好</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevWord()">上一個</button>
        <button onclick="speak()">🔊 朗讀</button>
        <button onclick="nextWord()">下一個</button>
    </div>

    <div class="controls">
        <div class="speed-controls">
            <button class="speed-btn" onclick="setSpeed(0.5, this)">0.5x</button>
            <button class="speed-btn active" onclick="setSpeed(1.0, this)">1.0x</button>
            <button class="speed-btn" onclick="setSpeed(1.5, this)">1.5x</button>
        </div>
    </div>

    <script>
        const words = [
            { jp: "こんにちは", reading: "Konnichiwa", zh: "你好" },
            { jp: "ありがとう", reading: "Arigatou", zh: "謝謝" },
            { jp: "おやすみなさい", reading: "Oyasuminasai", zh: "晚安" },
            { jp: "美味しい", reading: "Oishii", zh: "好吃" },
            { jp: "頑張って", reading: "Ganbatte", zh: "加油" },
            { jp: "素晴らしい", reading: "Subarashii", zh: "極好的" }
        ];

        let currentIndex = 0;
        let currentSpeed = 1.0;

        function updateCard() {
            const container = document.getElementById('cardContainer');
            container.classList.remove('flipped'); // 切換單字時自動翻回正面
            
            setTimeout(() => {
                document.getElementById('jpWord').innerText = words[currentIndex].jp;
                document.getElementById('jpReading').innerText = words[currentIndex].reading;
                document.getElementById('zhMeaning').innerText = words[currentIndex].zh;
            }, 150);
        }

        function toggleFlip() {
            document.getElementById('cardContainer').classList.toggle('flipped');
        }

        function nextWord() {
            currentIndex = (currentIndex + 1) % words.length;
            updateCard();
        }

        function prevWord() {
            currentIndex = (currentIndex - 1 + words.length) % words.length;
            updateCard();
        }

        function setSpeed(speed, btn) {
            currentSpeed = speed;
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function speak() {
            const text = words[currentIndex].jp;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            utterance.rate = currentSpeed;
            window.speechSynthesis.cancel(); // 停止目前的播放
            window.speechSynthesis.speak(utterance);
        }

        // 監聽鍵盤左右鍵切換
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextWord();
            if (e.key === 'ArrowLeft') prevWord();
            if (e.key === ' ') { e.preventDefault(); toggleFlip(); }
        });
    </script>
</body>
</html>
